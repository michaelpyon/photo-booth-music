<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎵</text></svg>">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Air Composer — Play Music With Your Hands</title>
    <meta name="description" content="Play a theremin and talk box with your hands using just a webcam. No installs. Runs entirely in the browser." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://air-composer.michaelpyon.com" />
    <meta property="og:title" content="Air Composer — Play Music With Your Hands" />
    <meta property="og:description" content="Play a theremin and talk box with your hands using just a webcam. No installs. Runs entirely in the browser." />
    <meta property="og:image" content="https://air-composer.michaelpyon.com/og.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Air Composer" />
    <meta name="twitter:description" content="Play a theremin and talk box with your hands using just a webcam. No installs." />
    <meta name="twitter:image" content="https://air-composer.michaelpyon.com/og.png" />
    <meta name="twitter:site" content="@michaelpyon" />
    <meta name="twitter:creator" content="@michaelpyon" />
    <link rel="canonical" href="https://air-composer.michaelpyon.com" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
      .mobile-gate {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 9999;
        background: #0f0f0f;
        color: #e0e0e0;
        font-family: 'Sora', system-ui, sans-serif;
        padding: 2rem;
        text-align: center;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 1.5rem;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
        max-height: 100vh;
        max-height: 100dvh;
      }
      .mobile-gate h1 {
        font-size: 1.8rem;
        font-weight: 700;
        margin: 0;
        color: #a78bfa;
      }
      .mobile-gate .tagline {
        font-size: 1rem;
        color: #c4b5fd;
        margin: 0;
      }
      .mobile-gate .preview-card {
        width: 100%;
        max-width: 320px;
      }
      .mobile-gate .preview-card img {
        width: 100%;
        max-width: 100%;
        border-radius: 12px;
        border: 1px solid rgba(167, 139, 250, 0.3);
        display: block;
      }
      .mobile-gate .explain {
        font-size: 0.9rem;
        color: #999;
        max-width: 320px;
        line-height: 1.6;
        margin: 0 auto;
      }
      .mobile-gate button {
        width: 100%;
        max-width: 320px;
        min-height: 52px;
        background: #a78bfa;
        color: #0f0f0f;
        border: none;
        border-radius: 10px;
        font-size: 1rem;
        font-weight: 700;
        cursor: pointer;
        padding: 0 1.5rem;
        font-family: inherit;
        transition: background 0.2s;
      }
      .mobile-gate button:active {
        background: #c4b5fd;
      }
      .mobile-gate button:focus-visible {
        outline: none;
        box-shadow: 0 0 0 2px #a78bfa, 0 0 0 4px rgba(167, 139, 250, 0.3);
      }
      .mobile-gate .back-link {
        color: #a78bfa;
        font-size: 0.9rem;
        text-decoration: none;
      }
      @media (max-width: 768px) {
        .mobile-gate { display: flex; }
        #app { display: none !important; }
      }
    </style>
  </head>
  <body>
    <div class="mobile-gate" id="mobile-notice">
      <h1>Air Composer</h1>
      <p class="tagline">Play music with your hands</p>
      <div class="preview-card">
        <img src="/og.png" alt="Air Composer preview" />
      </div>
      <p class="explain">Air Composer uses your webcam to track hand movements and turn them into music. It needs a desktop browser with a camera.</p>
      <button onclick="navigator.clipboard.writeText('https://air-composer.michaelpyon.com').then(() => this.textContent = 'Link copied!')">
        📋 Copy Link for Desktop
      </button>
      <a href="https://pyon.dev" class="back-link">← Back to pyon.dev</a>
    </div>
    <script>
      // Use both UA check and pointer capability for more robust detection
      var isMobile = /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent) ||
        (window.matchMedia && window.matchMedia('(pointer: coarse)').matches && window.innerWidth < 768);
      if (isMobile) {
        document.getElementById('mobile-notice').style.display = 'flex';
        document.getElementById('app').style.display = 'none';
      }
    </script>
    <div id="app">
      <div id="loading">
        <div class="loading-content">
          <div class="waveform-loader"><span></span><span></span><span></span><span></span><span></span></div>
          <p>Warming up your air instrument...</p>
        </div>
      </div>
      <div id="toolbar">
        <div id="mode-selector"></div>
        <div id="mode-controls"></div>
      </div>
      <div id="viewport">
        <video id="webcam" autoplay playsinline muted></video>
        <canvas id="overlay"></canvas>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
